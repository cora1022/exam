<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <div>
                <h1 style="font-size: 2rem; color: var(--primary);">Smart Quiz</h1>
            </div>
            <a href="admin.html" class="btn btn-outline">⚙️ 관리 센터</a>
        </header>

        <div id="start-screen">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem;">
                <h2>학습 과목 선택</h2>
                <select id="play-mode" class="btn btn-outline">
                    <option value="sequential">🔄 순서대로</option>
                    <option value="random">🔀 랜덤</option>
                </select>
            </div>
            <div class="category-grid" id="category-list"></div>
        </div>

        <div id="quiz" style="display: none;" class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
                <span id="quiz-category-badge" class="btn btn-outline">과목</span>
                <span id="quiz-progress">1 / 10</span>
            </div>
            <h2 id="question">질문 로딩 중...</h2>
            <ul id="options-list"></ul>
            <button id="submit" class="btn btn-primary" style="width: 100%;">다음으로</button>
        </div>

        <div id="result" style="display: none;" class="card">
            <h2>수고하셨습니다!</h2>
            <p id="score-text"></p>
            <div id="review-container"></div>
            <button onclick="location.reload()" class="btn btn-primary">처음으로</button>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
